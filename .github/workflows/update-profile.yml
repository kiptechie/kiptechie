name: Update GitHub Profile Assets

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure assets directory exists
        run: mkdir -p assets

      - name: Generate GitHub Stats SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          path: assets/github-stats.svg
          token: ${{ secrets.GH_PAT }}
          options: username=${{ github.repository_owner }}&theme=dracula&show_icons=true&include_all_commits=true&count_private=true

      - name: Generate GitHub Streak SVG
        uses: be-next/github-streak-stats-action@v1
        with:
          user: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output-path: assets/github-streak-stats.svg
          theme: dracula

      - name: Generate GitHub Trophies SVG
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: dracula
          title: -Issues,-Reviews
          output_path: assets/github-trophies.svg

      - name: Generate WakaTime SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: wakatime
          path: assets/wakatime.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          options: username=${{ secrets.WAKATIME_USERNAME }}&theme=dracula

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "docs: update profile assets" || exit 0
          git push
