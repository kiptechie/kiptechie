name: Update GitHub Profile Assets

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate GitHub Stats SVG
        uses: anuraghazra/github-readme-stats@master
        with:
          filename: assets/github-stats.svg
          show_icons: true
          theme: dracula
          include_all_commits: true
          count_private: true

      - name: Generate GitHub Trophies SVG
        uses: ryo-ma/github-profile-trophy@master
        with:
          filename: assets/github-trophies.svg
          theme: dracula

      - name: Generate WakaTime SVG
        uses: anuraghazra/github-readme-stats@master
        with:
          filename: assets/wakatime.svg
          show_icons: true
          theme: dracula
          api: wakatime # This is the key for WakaTime stats
          wakatime_user: kiptechie # Hardcoded for now, can be a secret

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "docs: update profile assets" || exit 0
          git push
