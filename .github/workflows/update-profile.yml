name: Update GitHub Profile Assets

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate GitHub Stats SVG
        uses: anuraghazra/github-readme-stats@master
        with:
          filename: assets/github-stats.svg
          show_icons: true
          theme: dracula
          include_all_commits: true
          count_private: true

      - name: Generate GitHub Trophies SVG
        uses: ryo-ma/github-profile-trophy@master
        with:
          filename: assets/github-trophies.svg
          theme: dracula

      - name: Update WakaTime Stats
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          SECTION_NAME: wakatime
          BLOCKS: ░▒▓█
          TIME_RANGE: last_7_days
          LANG_COUNT: 10
          SHOW_TIME: true
          SHOW_MASKED_TIME: true
          STOP_AT_LESS_THAN_ARBITRARY_MINUTES: false

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "docs: update profile assets" || exit 0
          git push
