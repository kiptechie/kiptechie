name: Update GitHub Profile Assets

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure assets directory exists
        run: mkdir -p assets

      - name: Generate GitHub Stats SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          path: assets/github-stats.svg
          token: ${{ secrets.GH_PAT }}
          options: username=${{ github.repository_owner }}&theme=dracula&show_icons=true&include_all_commits=true&count_private=true

      - name: Generate GitHub Streak SVG
        uses: be-next/github-streak-stats-action@v1
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          output-path: assets/github-streak-stats.svg
          theme: dracula

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Checkout Trophy Repository
        uses: actions/checkout@v4
        with:
          repository: ryo-ma/github-profile-trophy
          path: github-profile-trophy

      - name: Generate GitHub Trophies SVG (Filtered)
        env:
          GITHUB_TOKEN1: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd github-profile-trophy
          # Patch render_svg.ts to hide Issues and Reviews using the built-in filter list
          perl -0777 -pi -e 's/new Card\(\s*\[\],/new Card(["-Issues", "-Reviews"],/g' render_svg.ts
          deno run --allow-net --allow-env --allow-read --allow-write render_svg.ts "${{ github.repository_owner }}" "../assets/github-trophies.svg" "dracula"
          cd ..
          rm -rf github-profile-trophy

      - name: Generate WakaTime SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: wakatime
          path: assets/wakatime.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          options: username=${{ secrets.WAKATIME_USERNAME }}&theme=dracula

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "docs: update profile assets" || exit 0
          git push
